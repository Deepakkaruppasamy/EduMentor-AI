<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0d0f17" />
      <stop offset="100%" stopColor="#07080c" />
    </linearGradient>

    <!-- Logo Primary Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#4f63ff" />
      <stop offset="100%" stopColor="#9f7aea" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#38bdf8" />
      <stop offset="100%" stopColor="#818cf8" />
    </linearGradient>

    <!-- Subtle Glow Filter -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base Disc -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)" />
  <rect width="98" height="98" x="1" y="1" rx="23" stroke="rgba(79, 99, 255, 0.15)" strokeWidth="2" />

  <!-- Neural nodes connecting cap -->
  <line x1="50" y1="24" x2="22" y2="42" stroke="url(#logoGrad)" strokeWidth="1.5" opacity="0.4" strokeDasharray="2 2" />
  <line x1="50" y1="24" x2="78" y2="42" stroke="url(#logoGrad)" strokeWidth="1.5" opacity="0.4" strokeDasharray="2 2" />
  <line x1="22" y1="42" x2="50" y2="60" stroke="url(#logoGrad)" strokeWidth="1.5" opacity="0.4" strokeDasharray="2 2" />
  <line x1="78" y1="42" x2="50" y2="60" stroke="url(#logoGrad)" strokeWidth="1.5" opacity="0.4" strokeDasharray="2 2" />
  <line x1="50" y1="60" x2="50" y2="78" stroke="url(#accentGrad)" strokeWidth="2" opacity="0.6" />

  <!-- Neural Network Nodes -->
  <circle cx="50" cy="24" r="3.5" fill="#38bdf8" filter="url(#glow)" />
  <circle cx="22" cy="42" r="3.5" fill="#818cf8" filter="url(#glow)" />
  <circle cx="78" cy="42" r="3.5" fill="#818cf8" filter="url(#glow)" />
  <circle cx="50" cy="60" r="4" fill="#a78bfa" filter="url(#glow)" />
  <circle cx="50" cy="78" r="3" fill="#38bdf8" />

  <!-- Core Graduation Cap Shape -->
  <path
    d="M50 27L82 44L50 61L18 44Z"
    fill="url(#logoGrad)"
    fillOpacity="0.9"
    stroke="url(#accentGrad)"
    strokeWidth="1.5"
    filter="url(#glow)"
  />

  <!-- Tassel -->
  <path
    d="M50 44L32 52V70"
    stroke="#38bdf8"
    strokeWidth="1.5"
    strokeLinecap="round"
  />
  <circle cx="32" cy="70" r="2" fill="#38bdf8" />
</svg>
